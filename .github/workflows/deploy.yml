name: Build and deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json || true
          npm i

      - name: Build
        # VITE_* são lidas em build time pelo Vite (import.meta.env).
        # A landing /r/:code precisa delas pra chamar o Supabase e abrir
        # as stores certas. Sem os secrets configurados no repo, a página
        # mostra "Código inválido" em todo request.
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_STORE_URL: ${{ secrets.VITE_APP_STORE_URL }}
          VITE_PLAY_STORE_URL: ${{ secrets.VITE_PLAY_STORE_URL }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
