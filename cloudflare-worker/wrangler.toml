name = "ozly-og-worker"
main = "src/index.ts"
compatibility_date = "2024-09-01"

# Route: only triggers on /v/:code on the production domain.
# /me/* (dashboard) and other routes go straight to GH Pages.
routes = [
  { pattern = "ozly.au/v/*", zone_name = "ozly.au" },
]

# Public, non-secret values. The anon Supabase key is safe in client
