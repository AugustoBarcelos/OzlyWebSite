<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/OSLY.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Ozly for Organisations</title>
    <!--
      No-flash theme init. Runs synchronously BEFORE the React bundle so the
      <html data-theme> attribute is set before first paint — otherwise dark-
      mode users would see a white flash before React mounts and applies it.

      Mirrors getStoredTheme() + resolveTheme() in src/lib/theme.ts. If you
      change the storage key or the logic, update both.
    -->
    <script>
      (function () {
        try {
          var KEY = 'ozly.org.theme';
          var stored = localStorage.getItem(KEY);
          var pref = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var resolved =
            pref === 'system'
              ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
              : pref;
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
